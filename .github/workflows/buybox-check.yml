name: Buy Box Check — Mahen

on:
  schedule:
    - cron: "*/30 * * * *"
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && !startsWith(github.event.schedule, '0 7'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Comprobar Buy Box
        run: python scraper.py

      - name: Guardar datos en el repo
        run: |
          git config user.name "buybox-bot"
          git config user.email "buybox-bot@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "BB check $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

  daily_email:
    if: github.event_name == 'schedule' && startsWith(github.event.schedule, '0 7')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Enviar resumen diario por email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python email_digest.py
